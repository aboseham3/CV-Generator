<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CV Builder Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <h1>🔥 CV Builder Pro</h1>
  <p>Create a Netflix-style professional CV</p>
</div>

<div class="container">

<!-- FORM -->
<div class="form">

  <input id="name" placeholder="Full Name">
  <input id="title" placeholder="Job Title">

  <input id="phone" placeholder="Phone">
  <input id="email" placeholder="Email">
  <input id="city" placeholder="City">

  <textarea id="summary" placeholder="Summary"></textarea>
  <textarea id="experience" placeholder="Experience (one per line)"></textarea>
  <textarea id="education" placeholder="Education"></textarea>
  <textarea id="skills" placeholder="Skills"></textarea>
  <textarea id="projects" placeholder="Projects"></textarea>

  <div class="buttons">
    <button onclick="generateCV()">Generate</button>
    <button onclick="downloadPDF()">Download PDF</button>
  </div>

</div>

<!-- PREVIEW -->
<div id="cv-preview"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
