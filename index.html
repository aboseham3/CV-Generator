<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CV Builder Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <h1 id="title">CV Builder Pro</h1>
  <button id="langBtn">🌐 عربي / English</button>
</div>

<div class="container">

<div class="form">

<input id="name" placeholder="الاسم / Name">
<input id="job" placeholder="المسمى الوظيفي">
<input id="phone" placeholder="رقم الجوال">
<input id="email" placeholder="البريد الإلكتروني">
<input id="city" placeholder="المدينة">

<textarea id="summary" placeholder="النبذة"></textarea>
<textarea id="experience" placeholder="الخبرات (كل سطر)"></textarea>
<textarea id="education" placeholder="التعليم"></textarea>
<textarea id="skills" placeholder="المهارات"></textarea>
<textarea id="projects" placeholder="المشاريع"></textarea>

<div class="buttons">
<button id="generateBtn">🚀 إنشاء</button>
<button id="downloadBtn">📥 تحميل</button>
<button id="analyzeBtn">📊 تحليل</button>
</div>

<div id="analysis"></div>

</div>

<div id="cv-preview"></div>

</div>

<script src="script.js"></script>

</body>
</html>
