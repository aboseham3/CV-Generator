<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>CV Builder Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <h1 id="titleText">CV Builder Pro</h1>
  <button onclick="switchLang()">🌐 عربي / English</button>
</div>

<div class="container">

<!-- FORM -->
<div class="form">

  <h3 id="formTitle">البيانات الشخصية</h3>

  <input id="name" placeholder="الاسم الكامل">
  <input id="title" placeholder="المسمى الوظيفي">
  <input id="phone" placeholder="رقم الجوال">
  <input id="email" placeholder="البريد الإلكتروني">
  <input id="city" placeholder="المدينة">
  <input id="address" placeholder="العنوان">

  <textarea id="summary" placeholder="النبذة"></textarea>
  <textarea id="experience" placeholder="الخبرات (سطر لكل خبرة)"></textarea>
  <textarea id="education" placeholder="التعليم"></textarea>
  <textarea id="skills" placeholder="المهارات"></textarea>
  <textarea id="projects" placeholder="المشاريع"></textarea>

  <div class="buttons">
    <button onclick="generateCV()">🚀 إنشاء CV</button>
    <button onclick="downloadPDF()">📥 تحميل PDF</button>
    <button onclick="analyzeCV()">📊 تحليل</button>
  </div>

  <div id="analysis"></div>

</div>

<!-- CV -->
<div id="cv-preview"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
