<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Pro CV Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <h1>CV Builder Pro</h1>
  <p>Build a professional CV in seconds</p>
</div>

<div class="container">

<!-- ===== FORM ===== -->
<div class="form">

  <input id="name" placeholder="Full Name">
  <input id="title" placeholder="Job Title">
  <input id="phone" placeholder="Phone Number">
  <input id="email" placeholder="Email">
  <input id="city" placeholder="City">
  <input id="address" placeholder="Address">

  <textarea id="summary" placeholder="Professional Summary"></textarea>
  <textarea id="experience" placeholder="Experience (one per line)"></textarea>
  <textarea id="education" placeholder="Education"></textarea>
  <textarea id="skills" placeholder="Skills"></textarea>
  <textarea id="projects" placeholder="Projects"></textarea>

  <div class="buttons">
    <button onclick="generateCV()">Generate CV</button>
    <button onclick="downloadPDF()">Download PDF</button>
    <button onclick="analyzeCV()">Analyze</button>
  </div>

  <div id="analysis"></div>

</div>

<!-- ===== CV PREVIEW ===== -->
<div id="cv-preview"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
